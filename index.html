<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Trip Cost Calculator</title>

  <link rel="stylesheet" href="newstyle.css">
</head>

<body>

  <div class="mainBox">

    <h1>🌍 Trip Expense Planner</h1>

    <div class="cardArea">

      <div class="inputGroup">
        <label>Total Trip Budget</label>
        <input type="number" id="budgetInput" placeholder="Enter total amount">
      </div>

      <div class="inputGroup">
        <label>Stay Expense</label>
        <input type="number" id="stayCost" placeholder="Hotel / Stay">
      </div>

      <div class="inputGroup">
        <label>Food Expense</label>
        <input type="number" id="foodCost" placeholder="Food amount">
      </div>

      <div class="inputGroup">
        <label>Travel Expense</label>
        <input type="number" id="travelCost" placeholder="Transport amount">
      </div>

      <div class="inputGroup">
        <label>Total Members</label>
        <input type="number" id="peopleCount" placeholder="Friends count">
      </div>

      <button onclick="calculateData()">
        Calculate Trip Cost
      </button>

      <div class="resultBox">

        <h2 id="splitResult">
          ₹0
        </h2>

        <p>
          Cost Per Person
        </p>

        <h3 id="moneyLeft">
          Remaining Amount : ₹0
        </h3>

      </div>

    </div>

    <button class="themeBtn" onclick="changeTheme()">
      Switch Theme
    </button>

  </div>

  <script src="Script.js"></script>

</body>
</html>
